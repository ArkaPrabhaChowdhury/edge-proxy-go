# edge-proxy configuration
# Copy this file to config.yaml and edit as needed.
# All values have sensible defaults — only set what you need to change.
# Every field can also be set via environment variable (takes precedence).

proxy:
  port: "8080"          # env: PORT
  tls:
    enabled: false
    cert_file: "cert.pem"   # env: TLS_CERT
    key_file:  "key.pem"    # env: TLS_KEY

stats:
  port: "8081"          # env: STATS_PORT
  auth:
    enabled: false      # set DASHBOARD_PASS to auto-enable
    username: "admin"   # env: DASHBOARD_USER
    password: "changeme" # env: DASHBOARD_PASS

# Comma-separated list of backend addresses.  env: BACKENDS
backends:
  - "localhost:9000"
  - "localhost:9001"
  - "localhost:9002"

rate_limit:
  requests: 5           # legacy compatibility input
  window_seconds: 10    # legacy compatibility input
  identifier_header: "X-API-Key"
  base_requests_per_second: 5
  burst_capacity: 10
  sliding_window_seconds: 10
  soft_throttle_milliseconds: 250
  block_seconds: 30
  repeated_abuse_threshold: 3
  event_retention_seconds: 3600
  top_n: 10
  redis:
    addr: "localhost:6379"   # env: REDIS_ADDR
    password: ""             # env: REDIS_PASSWORD
    db: 0                    # env: REDIS_DB

health_check:
  enabled: true
  interval_seconds: 10  # how often to probe each backend
  timeout_seconds: 2    # TCP dial timeout per probe
